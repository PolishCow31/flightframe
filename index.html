// ---- helpers ----
const $card = document.getElementById('card');
const countEl = document.getElementById('count');
const haversine = (a,b,c,d)=>{const R=6371,toR=x=>x*Math.PI/180;
  const dLat=toR(c-a),dLon=toR(d-b);
  const h=Math.sin(dLat/2)**2+Math.cos(toR(a))*Math.cos(toR(c))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));};                 // km

// ---- route sanity: how far (mi) is the plane from the O->D great-circle path? ----
// The free route DBs are sometimes stale (e.g. a callsign's 2018 route), so we only
// trust a route if the aircraft is actually plausibly flying it.
const _bearing = (a,b,c,d)=>{const toR=x=>x*Math.PI/180; const φ1=toR(a),φ2=toR(c),Δλ=toR(d-b);
  return Math.atan2(Math.sin(Δλ)*Math.cos(φ2), Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ));};
function distToRouteMi(plat,plon, olat,olon, dlat,dlon){
  const R=6371;
  const d13=haversine(olat,olon,plat,plon)/R;                  // angular (rad)
  const θ13=_bearing(olat,olon,plat,plon), θ12=_bearing(olat,olon,dlat,dlon);
  const xt=Math.asin(Math.sin(d13)*Math.sin(θ13-θ12));         // cross-track (rad)
  const at=Math.acos(Math.max(-1,Math.min(1,Math.cos(d13)/Math.cos(xt))));  // along-track (rad)
  const d12=haversine(olat,olon,dlat,dlon)/R;
  let km;
  if(at<0) km=haversine(olat,olon,plat,plon);                  // before the origin
  else if(at>d12) km=haversine(dlat,dlon,plat,plon);           // past the destination
  else km=Math.abs(xt)*R;                                      // alongside the path
  return km*0.621371;
}
// rank how strongly the aircraft's LIVE state says "yes, it's flying o->d right now":
//   3 = on the line AND heading agrees (or nothing checkable -> legacy allow)
//   2 = within 150mi of the dest while DESCENDING, or of the origin while CLIMBING —
//       heading is useless mid-vector, but the vertical state says exactly which way
//       this leg is being flown (fixes vectored arrivals that the heading gate hid)
//   1 = within 75mi of either endpoint, any direction (taxi / turns / pattern work)
//   0 = not plausibly flying this leg
// Used both as the show/hide gate (rank>0) and to pick the right LEG of a multi-stop
// route / arbitrate between disagreeing route sources (higher rank wins).
function legRank(ac, o, d){
  if(typeof o.latitude!=='number'||typeof d.latitude!=='number'||typeof ac.lat!=='number') return 3; // can't check -> allow
  // cross-track tolerance SCALES with route length: a 400mi regional hop must hug its line
  // (~280mi), but a 7000mi transpacific (e.g. her ATL->ICN) legitimately wanders hundreds of
  // miles off the naive great circle on wind-optimised routing. ~13% of length, 280..900.
  const routeLen = haversine(o.latitude,o.longitude, d.latitude,d.longitude)*0.621371;
  const tol = Math.min(900, Math.max(280, routeLen*0.13));
  if(distToRouteMi(ac.lat,ac.lon, o.latitude,o.longitude, d.latitude,d.longitude) > tol) return 0;
  const dOrig = haversine(ac.lat,ac.lon, o.latitude,o.longitude)*0.621371;
  const dDest = haversine(ac.lat,ac.lon, d.latitude,d.longitude)*0.621371;
  // vertical-state carve-out: strictly SIGNED climb rate so an arrival at the stale
  // route's "origin" can't sneak through (descending != departing).
  const vs = (typeof ac.baro_rate==='number') ? ac.baro_rate : null;
  if(vs!=null && vs < -200 && dDest < 150) return 2;
  if(vs!=null && vs >  200 && dOrig < 150) return 2;
  if(Math.min(dOrig,dDest) < 75) return 1;
  // mid-route heading sanity: a plane truly flying O->D tracks roughly toward D. Catches a
  // stale route whose great circle merely clips the plane's position (RPA4740 class), and
  // return-legs flying the line backwards (DAL2699 class: on the JFK-PDX line, 170 deg off).
  if(typeof ac.track==='number'){
    const brg = (_bearing(ac.lat,ac.lon, d.latitude,d.longitude)*180/Math.PI + 360) % 360;
    const diff = Math.abs(((ac.track - brg + 540) % 360) - 180);   // 0..180 deg off
    if(diff > 90) return 0;
  }
  return 3;
}
function routeFits(ac, r){
  if(!(r&&r.origin&&r.destination)) return false;
  return legRank(ac, r.origin, r.destination) > 0;
}

// ---- dead-reckoning: estimate her position while she's off-signal ----
// When she drops off ADS-B (sparse coverage over oceans/poles), we project her last
// known position forward ALONG the known great-circle route by (groundspeed × elapsed
// time). It's an ESTIMATE — drawn dimmed + dashed and clearly labelled — overwritten by
// real data the instant she transmits again.
const FAV_STORE_KEY = 'ff_fav_state';
const EST_MAX_H = 18;   // past this since last contact the estimate is meaningless -> drop it

// intermediate point a fraction f (0..1) along the great circle from pt1 to pt2
function interpGC(lat1,lon1,lat2,lon2,f){
  const toR=x=>x*Math.PI/180, toD=x=>x*180/Math.PI;
  const p1=toR(lat1),l1=toR(lon1),p2=toR(lat2),l2=toR(lon2);
  const d=2*Math.asin(Math.sqrt(Math.sin((p2-p1)/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin((l2-l1)/2)**2));
  if(!d) return [lat1,lon1];
  const a=Math.sin((1-f)*d)/Math.sin(d), b=Math.sin(f*d)/Math.sin(d);
  const x=a*Math.cos(p1)*Math.cos(l1)+b*Math.cos(p2)*Math.cos(l2);
  const y=a*Math.cos(p1)*Math.sin(l1)+b*Math.cos(p2)*Math.sin(l2);
  const z=a*Math.sin(p1)+b*Math.sin(p2);
  return [toD(Math.atan2(z,Math.hypot(x,y))), toD(Math.atan2(y,x))];
}
// persist her last LIVE state (+ a geo-VALIDATED route) so we can estimate while offline
// and keep the card showing her constant info (reg/type/route) with no signal.
function saveFavState(ac, route){
  let prev={}; try{ prev=JSON.parse(localStorage.getItem(FAV_STORE_KEY))||{}; }catch(e){}
  const st = {
    reg:(ac.r||fav||'').toUpperCase(), hex:ac.hex, flight:(ac.flight||'').trim(),
    t:ac.t, desc:ac.desc, ownOp:ac.ownOp,
    lat:ac.lat, lon:ac.lon, gs:ac.gs, track:ac.track, alt:ac.alt_baro,
    ts: Date.now() - (typeof ac.seen_pos==='number'?ac.seen_pos:0)*1000,
    // keep the last VALIDATED route; only refresh it when the live route still geo-fits
    oI:prev.oI,oM:prev.oM,oLat:prev.oLat,oLon:prev.oLon, dI:prev.dI,dM:prev.dM,dLat:prev.dLat,dLon:prev.dLon
  };
  if(route&&route.origin&&route.destination&&routeFits(ac,route)){
    const o=route.origin,d=route.destination;
    st.oI=o.iata_code||o.icao_code; st.oM=o.municipality||''; st.oLat=o.latitude; st.oLon=o.longitude;
    st.dI=d.iata_code||d.icao_code; st.dM=d.municipality||''; st.dLat=d.latitude; st.dLon=d.longitude;
  }
  try{ localStorage.setItem(FAV_STORE_KEY, JSON.stringify(st)); }catch(e){}
}
function loadFavState(){
  let st=null; try{ st=JSON.parse(localStorage.getItem(FAV_STORE_KEY)); }catch(e){}
  if(!st) return null;
  if(fav && !fav.startsWith('TYPE:') && st.reg!==fav.toUpperCase()) return null; // now tracking a different plane
  return st;
}
// compute the estimate from stored state. tiers: enroute | arrived | lastknown | null
function estimateFav(st){
  if(!st || typeof st.lat!=='number') return null;
  const elapsedMs = Date.now() - (st.ts||0);
  if(elapsedMs < 0 || elapsedMs > EST_MAX_H*3.6e6) return null;
  const haveRoute = typeof st.dLat==='number' && typeof st.dLon==='number';
  const airborne  = st.alt!=='ground' && (st.gs||0) > 60;
  if(!haveRoute || !airborne) return {tier:'lastknown', lat:st.lat, lon:st.lon, track:st.track||0, elapsedMs};
  const remNm = haversine(st.lat,st.lon, st.dLat,st.dLon)*0.539957;   // nm still to fly (from last contact)
  const advNm = (st.gs||0) * (elapsedMs/3.6e6);                       // nm covered since contact
  if(advNm >= remNm) return {tier:'arrived', lat:st.dLat, lon:st.dLon, elapsedMs, remNm:0};
  const f = advNm/remNm;
  const [elat,elon] = interpGC(st.lat,st.lon, st.dLat,st.dLon, f);
  const brg = (_bearing(elat,elon, st.dLat,st.dLon)*180/Math.PI+360)%360;
  const remainNm = Math.max(0, remNm-advNm);
  let pct=null;
  if(typeof st.oLat==='number'){
    const total=haversine(st.oLat,st.oLon, st.dLat,st.dLon), done=haversine(st.oLat,st.oLon, elat,elon);
    pct = total? Math.max(0,Math.min(100, Math.round(100*done/total))) : null;
  }
  const etaMin = st.gs>0 ? Math.round(remainNm/st.gs*60) : null;
  return {tier:'enroute', lat:elat, lon:elon, track:brg, from:[st.lat,st.lon], remNm:Math.round(remainNm), pct, etaMin, elapsedMs};
}
function agoStr(ms){ const m=Math.round(ms/60000); if(m<60) return m+' min'; return Math.floor(m/60)+' h '+(m%60)+' min'; }
// dashed line from last contact to the estimated position (the "projected travel" cue)
function drawEstLine(a,b){
  // single (non-wrapping) world: a line spanning >180° of longitude would streak straight across
  // the whole map at the dateline. skip it then — the ghost marker still shows on its correct side.
  if(Math.abs(a[1]-b[1]) > 180){ clearEstLine(); return; }
  if(!estLine){ estLine = L.polyline([a,b],{color:FAV_COLOR,weight:2,opacity:.5,dashArray:'4 7',interactive:false}).addTo(map); }
  else estLine.setLatLngs([a,b]);
}
function clearEstLine(){ if(estLine){ map.removeLayer(estLine); estLine=null; } }

// ---- top-down aircraft silhouettes, one per type family ----
// Each is built from simple primitives in a 100x100 box, nose pointing UP
// (so a rotate(track) lines it up with heading). fill=currentColor, so the
// wrapper's text colour drives it (operator class, or pink for the favourite).
const SIL = {
  ga_single:`<ellipse cx="50" cy="13" rx="11" ry="3.2" opacity=".3"/><path d="M50 9 L53 22 L53 86 L47 86 L47 22 Z"/><rect x="9" y="41" width="82" height="6" rx="3"/><rect x="33" y="82" width="34" height="4" rx="2"/>`,
  ga_twin:`<ellipse cx="29" cy="40" rx="6" ry="2.6" opacity=".28"/><ellipse cx="71" cy="40" rx="6" ry="2.6" opacity=".28"/><path d="M50 11 L53 24 L53 86 L47 86 L47 24 Z"/><rect x="9" y="43" width="82" height="6.5" rx="3.2"/><rect x="25.5" y="39" width="7" height="12" rx="2"/><rect x="67.5" y="39" width="7" height="12" rx="2"/><rect x="33" y="83" width="34" height="4" rx="2"/>`,
  turboprop:`<ellipse cx="26" cy="37" rx="7" ry="3" opacity=".28"/><ellipse cx="74" cy="37" rx="7" ry="3" opacity=".28"/><path d="M50 9 L53 22 L53 87 L47 87 L47 22 Z"/><rect x="6" y="42" width="88" height="7.5" rx="3.5"/><rect x="21" y="36" width="9" height="14" rx="2.5"/><rect x="70" y="36" width="9" height="14" rx="2.5"/><rect x="29" y="84" width="42" height="5" rx="2.5"/>`,
  regional:`<rect x="47" y="9" width="6" height="80" rx="3"/><path d="M50 6 L47 15 L53 15 Z"/><polygon points="47,45 17,63 17,67 47,56"/><polygon points="53,45 83,63 83,67 53,56"/><polygon points="47.5,80 34,89 34,90 47.5,84"/><polygon points="52.5,80 66,89 66,90 52.5,84"/><ellipse cx="44.5" cy="73" rx="2.3" ry="4.4"/><ellipse cx="55.5" cy="73" rx="2.3" ry="4.4"/>`,
  narrowbody:`<rect x="46.5" y="10" width="7" height="80" rx="3.5"/><path d="M50 6 L46.5 16 L53.5 16 Z"/><polygon points="47,44 8,64 8,68 47,57"/><polygon points="53,44 92,64 92,68 53,57"/><polygon points="47.5,80 31,89 31,90.5 47.5,84"/><polygon points="52.5,80 69,89 69,90.5 52.5,84"/><ellipse cx="38" cy="55" rx="2.7" ry="5.2"/><ellipse cx="62" cy="55" rx="2.7" ry="5.2"/>`,
  widebody:`<rect x="45.5" y="8" width="9" height="84" rx="4.5"/><path d="M50 4 L45.5 15 L54.5 15 Z"/><polygon points="46,42 5,63 5,68 46,55"/><polygon points="54,42 95,63 95,68 54,55"/><polygon points="47,82 27,92 27,93.5 47,86"/><polygon points="53,82 73,92 73,93.5 53,86"/><ellipse cx="34" cy="54" rx="3.5" ry="6.8"/><ellipse cx="66" cy="54" rx="3.5" ry="6.8"/>`,
  bizjet:`<rect x="47.5" y="11" width="5" height="76" rx="2.5"/><path d="M50 8 L47.5 17 L52.5 17 Z"/><polygon points="48,48 23,63 23,66 48,57"/><polygon points="52,48 77,63 77,66 52,57"/><polygon points="48,79 38,87 38,88 48,82"/><polygon points="52,79 62,87 62,88 52,82"/><ellipse cx="45.5" cy="74" rx="1.9" ry="3.8"/><ellipse cx="54.5" cy="74" rx="1.9" ry="3.8"/>`,
  heli:`<circle cx="50" cy="46" r="33" opacity=".15"/><rect x="17" y="45.2" width="66" height="1.6" rx=".8" opacity=".5"/><rect x="49.2" y="13" width="1.6" height="66" rx=".8" opacity=".5"/><ellipse cx="50" cy="50" rx="8" ry="15"/><rect x="48.5" y="49" width="3" height="41" rx="1.5"/><rect x="43" y="86" width="14" height="3" rx="1.5"/>`,
  glider:`<ellipse cx="50" cy="40" rx="3" ry="1.5" opacity=".25"/><path d="M50 9 L52 20 L52 88 L48 88 L48 20 Z"/><rect x="4" y="40" width="92" height="3.4" rx="1.7"/><rect x="37" y="85" width="26" height="3" rx="1.5"/>`,
  generic:`<rect x="46.5" y="10" width="7" height="80" rx="3.5"/><path d="M50 6 L46.5 16 L53.5 16 Z"/><polygon points="47,45 12,63 12,67 47,56"/><polygon points="53,45 88,63 88,67 53,56"/><polygon points="47.5,80 32,89 32,90 47.5,84"/><polygon points="52.5,80 68,89 68,90 52.5,84"/>`
};
const SIL_BASE = {ga_single:20,ga_twin:22,turboprop:25,regional:25,bizjet:22,narrowbody:30,widebody:40,heli:23,glider:26,generic:27};

// map a type code (+ ADS-B category) to a silhouette family. heuristic, generous.
function family(ac){
  const t=(ac.t||'').toUpperCase(), cat=(ac.category||'').toUpperCase();
  if(cat==='A7'||/^(EC|AS3|AS5|AS6|R22|R44|R66|B06|B407|B41|B42|B47|H50|H60|H47|S76|S92|A109|A119|A139|MD5|UH|EH|GAZ)/.test(t)) return 'heli';
  if(/^(GLID|AS2[0-9]|DG[0-9]|LS[0-9]|SZD|DISC|VENT|JANU|NIMB|ARCU|G103|DUOD)/.test(t)) return 'glider';
  if(/^(C72|C120|C121|C150|C152|C162|C170|C172|C177|C180|C182|C185|C206|C210|C82|T206|P28|PA28|PA18|PA32|P32|PA38|PA46|SR2|S22T|DA40|DA20|DV20|BE33|BE35|BE36|BE77|M20|AA5|GLST|RV|AC11|COL|TB2|S108|T6|GX|CRUZ)/.test(t)) return 'ga_single';
  if(/^(BE58|BE55|BE76|PA30|PA34|PA44|C310|C320|C337|C340|C402|C404|C414|C421|PA31|BE9)/.test(t)) return 'ga_twin';
  if(/^(BE20|B350|B190|C208|C212|C441|PC12|PC6|TBM|AT7|AT4|AT5|DHC|DH8|D28|SF34|SW4|E110|E120|SB20|F406|LNP4|P46T)/.test(t)) return 'turboprop';
  if(/^(CRJ|E13|E14|E17|E45|E70|E75|RJ1|RJ85|B461|B462|B463|ATR|F70|F100)/.test(t)) return 'regional';
  if(/^(C25|C50|C51|C52|C55|C56|C68|C70|C75|CL30|CL35|CL60|CL65|GLF|GALX|GLEX|GL5|GL7|G150|G280|LJ|H25|HA4T|HDJT|FA|F2TH|F900|FA7X|FA8X|PRM|BE40|E50P|E55P|E545|E550|E54|SF50|C500|C510|C525|C526|ASTR|WW24)/.test(t)) return 'bizjet';
  if(/^(B74|B77|B78|B76|A33|A34|A35|A38|A30|A310|A311|MD11|DC10|IL9|IL76|B70|A124)/.test(t)) return 'widebody';
  if(/^(B73|B71|B72|B37|B38|B39|A19|A20|A21|A22|A318|A319|A320|A321|A220|BCS|B75|MD8|MD9|E190|E195|E290|E295|C919|SU9)/.test(t)) return 'narrowbody';
  if(cat==='A5'||cat==='A4') return 'widebody';
  if(cat==='A3') return 'narrowbody';
  if(cat==='A2') return 'bizjet';
  if(cat==='A1'||cat==='B1') return 'ga_single';
  return 'generic';
}

// operator class -> colour. commercial = airliner, private = GA/business, heli = rotor.
function planeClass(ac){
  const cat=(ac.category||'').toUpperCase();
  const cs=(ac.flight||'').trim().toUpperCase(), reg=(ac.r||'').toUpperCase();
  const own=(ac.ownOp||'').toUpperCase();
  if(/\b(AIR FORCE|ARMY|NAVY|MARINE|NATIONAL GUARD|COAST GUARD|USAF|MILITARY)\b/.test(own)
     || /^(RCH|REACH|PAT\d|EVAC|SPAR|CNV|GRZLY|SLAM|RONIN|MOOSE|GUARD)/.test(cs)) return 'mil';
  if(cat==='A7') return 'heli';
  // fractional / charter ops (NetJets, Flexjet, Jet Linx, Wheels Up...) fly airline-style
  // callsigns but are PRIVATE bizjets to any normal viewer -> amber, not airline blue.
  if(/^(EJA|LXJ|NJM|JTL|EJM|WUP)/.test(cs)) return 'private';
  if(cat==='A3'||cat==='A4'||cat==='A5') return 'commercial';
  const airlineCS = /^[A-Z]{3}\d/.test(cs) && cs!==reg;     // ICAO airline callsign
  if(airlineCS && cat!=='A1') return 'commercial';
  return 'private';
}

// the airline (if recognised) from the callsign's 3-letter ICAO prefix
function airline(ac){
  const m = (ac.flight||'').trim().toUpperCase().match(/^[A-Z]{3}/);
  return m ? AIRLINES[m[0]] : null;
}
// family() and planeClass() are regex-heavy and get asked about the same aircraft
// several times per paint — memoise on the aircraft object (it's rebuilt each fetch,
// so the cache naturally lives exactly one data cycle).
const classOf = ac => ac._cls || (ac._cls = planeClass(ac));
const famOf   = ac => ac._fam || (ac._fam = family(ac));
function planeColor(ac){ return CAT[classOf(ac)] || CAT.private; }

function silSize(fam, z){
  const base = SIL_BASE[fam]||27;
  // single zoom break: compact when zoomed out, larger when zoomed in to inspect.
  // one break = at most one icon-rebuild per scroll gesture (keeps fast zoom smooth).
  return Math.round(base * (z>=8 ? 1.12 : 0.82));
}
function silSVG(ac, fam, size, color){
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100"`
       + ` style="transform:rotate(${ac.track||0}deg)"><g fill="${color}">`
       + `${SIL[fam]||SIL.generic}</g></svg>`;
}
// the favourite: its real silhouette, in the spotlight colour, with ring + label.
// est=true => dead-reckoned ghost: dimmed, grey "EST ·" label, no pulsing ring.
function favIcon(ac, est){
  const fam = famOf(ac), size = Math.max(36, silSize(fam, map.getZoom())+8);
  const ring = est ? '' : '<div class="fav-ring"></div>';
  const label = (est?'EST · ':'') + esc(ac.r||fav);
  return L.divIcon({className: est?'plane fav fav-est':'plane fav', iconSize:[size,size], iconAnchor:[size/2,size/2],
    html:`<div class="fav-wrap">${silSVG(ac,fam,size,FAV_COLOR)}${ring}<div class="fav-label">${label}</div></div>`});
}

// is "ac" the favourite?  match by registration OR hex, or by type: prefix
function isFav(ac){
  if(!fav) return false;
  if(fav.startsWith('TYPE:')) return (ac.t||'').toUpperCase()===fav.slice(5);
  return (ac.r||'').toUpperCase()===fav || (ac.hex||'').toUpperCase()===fav;
}

// ============================================================================
//  PlaneLayer — ALL non-favourite planes on one canvas.
//  Why: DOM markers cost per-element layout/composite work that scales with the
//  plane count and made zoom/pan stutter (the old fix swapped silhouettes for
//  dots mid-motion). A single canvas rides the map pane during pans for free,
//  CSS-scales during zooms (same trick as the tile layer / Leaflet's own
//  L.Canvas), and redraws crisp at rest. No silhouette cap, no dot fallback,
//  no swap — silhouettes simply stay put.
//  Silhouettes are pre-rasterised ONCE per (family × class × size tier) from the
//  same SIL svg strings, then stamped with drawImage rotated to heading.
// ============================================================================
const PAD = 0.25;                  // extra canvas margin so small pans don't show blank edges
const RAD = Math.PI/180;
const _sprites = new Map();        // 'fam|class|tier' -> {img,size,ready}
function sprite(fam, cls, big){
  const key = fam+'|'+cls+'|'+(big?1:0);
  let s = _sprites.get(key);
  if(s) return s.ready ? s : null;                 // null while the raster loads -> dot fallback
  const size = Math.round((SIL_BASE[fam]||27) * (big?1.12:0.82));
  const img = new Image();
  s = {img, size, ready:false}; _sprites.set(key, s);
  // 2x raster so rotated draws stay crisp; viewBox padding keeps the shadow unclipped
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size*2}" height="${size*2}" viewBox="-6 -6 112 112">`
    + `<g fill="${CAT[cls]||CAT.private}" style="filter:drop-shadow(0 0 1.5px rgba(0,0,0,.65))">${SIL[fam]||SIL.generic}</g></svg>`;
  img.onload = ()=>{ s.ready = true; planeLayer.redrawPlanes(); };
  img.src = 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
  return null;
}
// ---- glide animation state: planes tween between consecutive fixes ----
// On each data cycle the tween restarts: from = wherever the plane is DISPLAYED right
// now (mid-tween safe), to = the new fix; k runs 0->1 over REFRESH_MS. One poll of
// latency, perfectly smooth, no overshoot (the FR24 approach).
const anim = new Map();           // hex -> {fLat,fLon,fTrk, tLat,tLon,tTrk, gs, t0}
let liveHexes = new Set();        // hexes present in the CURRENT poll (render() refreshes it);
                                  // trail clamping keys off this, not anim existence — a
                                  // grace-window dropout has no sprite/connector to cover
                                  // the withheld segment, so its full trail must draw
const EXTRAP_MAX_MS = 10000;      // dead-reckon past a late poll for up to ~2.5 cycles, then hold
function lerpAngle(a,b,k){ const d=((b-a+540)%360)-180; return (a+d*k+360)%360; }
// One evaluator for every glide (canvas planes AND her DOM marker): lerp f->t over
// REFRESH_MS, and past k=1 keep dead-reckoning along the target track at the fix's
// groundspeed (capped) — so a late poll or a stale repeated position never freezes
// the sprite. commitAnim starts the next tween from THIS displayed position, so an
// extrapolation overshoot eases back over the next cycle instead of snapping.
function tweenPos(st, now){
  const el = now - st.t0, k = el >= REFRESH_MS ? 1 : el/REFRESH_MS;
  let lat = st.fLat+(st.tLat-st.fLat)*k, trk = lerpAngle(st.fTrk, st.tTrk, k);
  // antimeridian: a ±180-straddling pair would lerp the long way round — snap to target
  let lon = (Math.abs(st.tLon-st.fLon) > 180) ? st.tLon : st.fLon+(st.tLon-st.fLon)*k;
  if(k === 1 && st.gs){
    const nm = st.gs * Math.min(el - REFRESH_MS, EXTRAP_MAX_MS) / 3.6e6;  // kts × ms → nm
    const r = st.tTrk*RAD;
    lat = st.tLat + (nm/60)*Math.cos(r);
    lon += (nm/60)*Math.sin(r)/Math.max(.2, Math.cos(st.tLat*RAD));
    if(lon > 180) lon -= 360; else if(lon < -180) lon += 360;
  }
  return [lat, lon, trk];
}
function commitAnim(hex, lat, lon, trk, gs, now){
  // a fix can arrive with NO track (just-acquired / on-ground / heli). Coerce to a
  // number on FIRST sight — an undefined here would feed lerpAngle and poison fTrk
  // to NaN forever (canvas rotate(NaN) => the sprite silently stops drawing).
  const t = (typeof trk==='number') ? trk : 0;
  let st = anim.get(hex);
  if(!st){ anim.set(hex, {fLat:lat,fLon:lon,fTrk:t, tLat:lat,tLon:lon,tTrk:t, gs:gs||0, t0:now-REFRESH_MS}); return; }
  // identical fix (stale upstream position, or a failed poll recommitting the kept
  // frame): do NOT restart the tween — from would be the extrapolated position and
  // the target the old fix BEHIND it (backward glide). Leave t0 alone so the
  // dead-reckoning clock keeps running to its cap, then holds. This is also what
  // actually un-freezes planes whose served position repeats across polls.
  if(lat===st.tLat && lon===st.tLon){ st.gs = gs||0; return; }
  const d = tweenPos(st, now);       // wherever it's DISPLAYED, extrapolation included
  st.fLat = d[0]; st.fLon = d[1]; st.fTrk = d[2];
  st.tLat = lat; st.tLon = lon;
  st.tTrk = (typeof trk==='number') ? trk : st.tTrk;
  st.gs = gs||0;
  st.t0 = now;
}
function animPos(hex, now){
  const st = anim.get(hex); return st ? tweenPos(st, now) : null;
}

const PlaneLayer = L.Layer.extend({
  initialize(opts){ L.setOptions(this, opts); },
  onAdd(){
    // TWO canvases: trails redraw only when data commits (every 4s) or the view
    // settles; planes redraw every animation frame (the glide). Both carry
    // leaflet-zoom-animated — LOAD-BEARING: transform-origin:0 0 so the mid-zoom
    // CSS scale pivots on the corner (without it planes slide off while wheeling).
    this._trailC = L.DomUtil.create('canvas', 'leaflet-zoom-animated');
    this._planeC = L.DomUtil.create('canvas', 'leaflet-zoom-animated');
    this._tctx = this._trailC.getContext('2d');
    this._pctx = this._planeC.getContext('2d');
    for(const c of [this._trailC, this._planeC]){
      c.style.position = 'absolute';
      this.getPane().appendChild(c);
    }
    this._update();
  },
  onRemove(){ L.DomUtil.remove(this._trailC); L.DomUtil.remove(this._planeC); },
  getEvents(){
    return { viewreset:this._update, moveend:this._update, resize:this._update,
             zoom:this._onZoom, zoomanim:this._onAnimZoom, zoomend:this._onZoomEnd };
  },
  // while a zoom is in flight the canvases are CSS-scaled (cheap, GPU) and the
  // per-frame glide redraw is SUSPENDED (this._zooming) — redrawing against a map
  // whose zoom disagrees with the canvas transform would double-transform and fling
  // planes off position. _update() repaints crisp the moment the zoom settles.
  _onZoom(){ this._zooming = true; this._applyT(this._map.getCenter(), this._map.getZoom()); },
  _onAnimZoom(e){ this._zooming = true; this._applyT(e.center, e.zoom); },
  _onZoomEnd(){ this._zooming = false; },
  _applyT(center, zoom){
    const m = this._map,
      scale = m.getZoomScale(zoom, this._zoom),
      viewHalf = m.getSize().multiplyBy(0.5 + PAD),
      currentCenterPoint = m.project(this._center, zoom),
      topLeftOffset = viewHalf.multiplyBy(-scale).add(currentCenterPoint)
        .subtract(m._getNewPixelOrigin(center, zoom));
    L.DomUtil.setTransform(this._trailC, topLeftOffset, scale);
    L.DomUtil.setTransform(this._planeC, topLeftOffset, scale);
  },
  _update(){
    const m = this._map;
    if(m._animatingZoom) return;
    this._zooming = false;
    const size = m.getSize(), min = m.containerPointToLayerPoint(size.multiplyBy(-PAD)).round();
    const prevMin = this._bounds && this._bounds.min, prevZoom = this._zoom;
    this._bounds = new L.Bounds(min, min.add(size.multiplyBy(1 + PAD*2)).round());
    this._center = m.getCenter(); this._zoom = m.getZoom();
    const bs = this._bounds.getSize();
    const dpr = this._dpr = Math.min(window.devicePixelRatio||1, 2);
    let sizeChanged = false;
    for(const c of [this._trailC, this._planeC]){
      if(c.width !== bs.x*dpr || c.height !== bs.y*dpr){
        c.width = bs.x*dpr; c.height = bs.y*dpr;
        c.style.width = bs.x+'px'; c.style.height = bs.y+'px';
        sizeChanged = true;
      }
      L.DomUtil.setPosition(c, this._bounds.min);
    }
    // skip the (expensive) full repaint when this _update is a sub-pixel follow-nudge:
    // same zoom, same canvas size, origin moved <1px. The map.setView() that "follow
    // her plane" fires every 4s lands here right after render() already drew the new
    // data — without this it doubled the trail+plane repaint on every poll while following.
    if(!sizeChanged && prevZoom===this._zoom && prevMin &&
       Math.abs(prevMin.x-this._bounds.min.x)<1 && Math.abs(prevMin.y-this._bounds.min.y)<1) return;
    this.redrawTrails();
    this.redrawPlanes();
  },
  // hoisted Web-Mercator projection: canvas-local pixel of a lat/lon with the pixel
  // origin folded in once. Equals Leaflet's latLngToLayerPoint()-b.min to <1px
  // (verified in-page), but allocates nothing — the old per-point latLngToLayerPoint
  // churned ~25-50k LatLng/Point objects per trail repaint (a Pi hitch every 4s).
  _proj(){
    const m = this._map, b = this._bounds, po = m.getPixelOrigin();
    return { scale: 256*Math.pow(2, m.getZoom()), ox: po.x + b.min.x, oy: po.y + b.min.y };
  },
  // ---- trails: head→tail alpha fade, batched into one multi-subpath stroke per
  //      (colour × fade-tier × width) bucket — ~20 strokes for the whole frame ----
  redrawTrails(){
    const m = this._map, b = this._bounds; if(!b || !m || this._zooming) return;
    _dTrail++;
    const ctx = this._tctx, dpr = this._dpr||1, bs = b.getSize();
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,bs.x,bs.y);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    const pc = this._proj(), sc = pc.scale, ox = pc.ox, oy = pc.oy, R4PI = 4*Math.PI;
    const px = lon => sc*(lon/360 + 0.5) - ox;
    const py = lat => { const s=Math.sin(lat*RAD); return sc*(0.5 - Math.log((1+s)/(1-s))/R4PI) - oy; };
    const buckets = [];              // sparse, indexed by small integer key
    const FADE = [.08,.16,.26,.38], FADE_FAV = [.18,.34,.52,.72], S = 300;
    for(const [hex,h] of history){
      const isF = hex===favTrailHex;
      // PLANE LEADS THE PATH: while a glide is in flight, the newest committed fix
      // is where the sprite is HEADED, not where it is — so the static trail stops
      // one fix short, and the per-frame head connector (redrawPlanes) draws the
      // live segment from there to the gliding sprite. The trail only "catches up"
      // as the plane actually travels it.
      // Clamp ONLY while something actually draws the withheld segment: for her,
      // live tracking (!favIsEst — the ghost's connector is suppressed and the
      // dashed est line starts AT the withheld fix); for the rest, planes still in
      // the feed (a grace-window dropout has no sprite/connector — draw it all).
      const end = (isF ? (favAnim && !favIsEst) : (anim.get(hex) && liveHexes.has(hex))) ? h.length-1 : h.length;
      if(end < 2) continue;
      if(!isF && h._cls && hidden[h._cls]) continue;
      // viewport reject on head AND tail: a long trail (esp. her 50nm) can straddle
      // the view with its head panned off — culling on the head alone made the
      // still-visible body disappear at high zoom.
      const hx = px(h[end-1][1]), hy = py(h[end-1][0]);
      const tx = px(h[0][1]),     ty = py(h[0][0]);
      if((hx<-S&&tx<-S)||(hx>bs.x+S&&tx>bs.x+S)||(hy<-S&&ty<-S)||(hy>bs.y+S&&ty>bs.y+S)) continue;
      const w = isF ? 4.5 : 1.4, fade = isF ? FADE_FAV : FADE, n = end-1;
      const baseIdx = isF ? 5 : (CLS_IDX[h._cls]||0), favBit = isF?1:0;
      let prevx = px(h[0][1]), prevy = py(h[0][0]);
      for(let i=1; i<end; i++){
        const cx = px(h[i][1]), cy = py(h[i][0]);
        const tier = i/n < .25 ? 0 : i/n < .5 ? 1 : i/n < .75 ? 2 : 3;
        const key = baseIdx*8 + tier*2 + favBit;
        let bk = buckets[key];
        if(!bk){ bk = buckets[key] = {col:TRAIL_PAL[baseIdx], alpha:fade[tier], w, segs:[]}; }
        bk.segs.push(prevx, prevy, cx, cy);
        prevx = cx; prevy = cy;
      }
    }
    for(const bk of buckets){
      if(!bk) continue;
      ctx.strokeStyle = bk.col; ctx.globalAlpha = bk.alpha; ctx.lineWidth = bk.w;
      ctx.beginPath();
      const s = bk.segs;
      for(let i=0; i<s.length; i+=4){ ctx.moveTo(s[i],s[i+1]); ctx.lineTo(s[i+2],s[i+3]); }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  },
  // ---- planes: sprites at their INTERPOLATED positions; runs every anim frame ----
  redrawPlanes(){
    const m = this._map, b = this._bounds; if(!b || !m || this._zooming) return;
    _dPlane++;
    const ctx = this._pctx, dpr = this._dpr||1, bs = b.getSize();
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,bs.x,bs.y);
    const z = m.getZoom(), withLabel = z>=LABEL_ZOOM, useSil = z>=SIL_ZOOM, big = z>=8;
    const connect = z >= 7.5;        // head connector only when the 4s gap is visible (px scale)
    const now = performance.now();
    const labels = withLabel ? [] : null;
    const pc = this._proj(), sc = pc.scale, ox = pc.ox, oy = pc.oy, R4PI = 4*Math.PI;
    const px = lon => sc*(lon/360 + 0.5) - ox;
    const py = lat => { const s=Math.sin(lat*RAD); return sc*(0.5 - Math.log((1+s)/(1-s))/R4PI) - oy; };
    ctx.lineCap = 'round';
    for(const ac of latestPlanes){
      if(!ac.hex || typeof ac.lat!=='number') continue;
      if(isFav(ac) || hidden[classOf(ac)]) continue;
      const ap = animPos(ac.hex, now);
      const lat = ap?ap[0]:ac.lat, lon = ap?ap[1]:ac.lon, trk = ap?ap[2]:(ac.track||0);
      const x = px(lon), y = py(lat);
      if(x<-24 || y<-24 || x>bs.x+24 || y>bs.y+24) continue;
      // live head segment: the trail's last DRAWN point -> gliding position. The
      // static trail stops one fix short while gliding (redrawTrails), so this IS
      // the trail's head, growing behind the plane. (Only drawn when zoomed enough
      // for the gap to be visible.)
      if(connect){
        const h = history.get(ac.hex);
        const li = h ? (anim.get(ac.hex) ? h.length-2 : h.length-1) : -1;
        if(li >= 0){
          const lx = px(h[li][1]), ly = py(h[li][0]);
          if(Math.abs(lx-x)>2 || Math.abs(ly-y)>2){
            ctx.strokeStyle = planeColor(ac);
            ctx.globalAlpha = .38; ctx.lineWidth = 1.4;
            ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(x,y); ctx.stroke();
            ctx.globalAlpha = 1;
          }
        }
      }
      let drawn = false;
      if(useSil){
        const s = sprite(famOf(ac), classOf(ac), big);
        if(s){
          const half = s.size/2;
          ctx.save(); ctx.translate(x,y); ctx.rotate(trk*RAD);
          ctx.drawImage(s.img, -half, -half, s.size, s.size); ctx.restore();
          if(labels) labels.push([((ac.flight||'').trim()||ac.r||''), x, y+half+8]);
          drawn = true;
        }
      }
      if(!drawn){ ctx.fillStyle = planeColor(ac); ctx.beginPath(); ctx.arc(x,y,4,0,6.2832); ctx.fill(); }
    }
    // favourite head connector: her trail's last DRAWN point (one fix short while
    // gliding) -> her gliding DOM marker, styled as the trail's newest tier so it
    // reads as the trail growing behind her.
    if(connect && favTrailHex && favAnim && !favIsEst){
      const h = history.get(favTrailHex);
      if(h && h.length >= 2){
        const p = tweenPos(favAnim, now);
        const gx = px(p[1]), gy = py(p[0]);
        const lx = px(h[h.length-2][1]), ly = py(h[h.length-2][0]);
        if(Math.abs(lx-gx)>2 || Math.abs(ly-gy)>2){
          ctx.strokeStyle = FAV_COLOR;
          ctx.globalAlpha = .72; ctx.lineWidth = 4.5;
          ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(gx,gy); ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
    }
    if(labels && labels.length){      // labels in one pass so font/style is set once
      ctx.font = '600 9px ui-monospace,Menlo,monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,.75)'; ctx.fillStyle = '#e9eef6';
      for(const [t,x,y] of labels){ if(t){ ctx.strokeText(t,x,y); ctx.fillText(t,x,y); } }
    }
  }
});
map.createPane('planes').style.zIndex = 450;   // above rings(400), below DOM markers(600)
const planeLayer = new PlaneLayer({pane:'planes'});
map.addLayer(planeLayer);

// ---- the glide loop: ZOOM-ADAPTIVE frame rate, suspended while zooming.
// The redraw only needs to run when the fastest plausible plane has moved ~0.4px
// at the CURRENT zoom. At the wall frame's default z6 a 480kt jet moves ~0.1px/s,
// so one redraw every ~2s is visually identical to 30fps — and ~60x less canvas
// work, which is the difference between smooth and laggy on the Raspberry Pi.
// Full 30fps only engages at street-level zooms where motion is actually visible.
// Pans/zooms/data commits redraw immediately via their own paths regardless.
// rAF stops automatically in hidden tabs, so this costs nothing in the background.
const MAX_MPS = 260;             // ~505kt — fastest thing the frame will ever show
let frameInterval = 33;          // ms between glide redraws; retuned per zoom
function retuneFrameRate(){
  const mpp = 40075016.686 * Math.abs(Math.cos(map.getCenter().lat*RAD))
              / (256 * Math.pow(2, map.getZoom()));   // metres per CSS pixel here
  const pxPerSec = MAX_MPS / mpp;
  frameInterval = Math.max(33, Math.min(2000, 400 / pxPerSec));  // time to move 0.4px
}
retuneFrameRate();
map.on('zoomend moveend', retuneFrameRate);
let lastFrame = 0;
function glideFrame(now){
  requestAnimationFrame(glideFrame);
  _dRaf++;
  if(now - lastFrame < frameInterval) return;
  lastFrame = now;
  planeLayer.redrawPlanes();
  // the favourite is a DOM marker — glide it too. Suspend during a zoom: Leaflet
  // CSS-animates marker positions through the zoom, and an explicit setLatLng each
  // frame would fight that and make her hop. (redrawPlanes self-suspends already.)
  if(favMarker && favAnim && !planeLayer._zooming){
    // tweenPos handles the lerp, the ±180 antimeridian snap, AND extrapolation
    // past a late poll — same evaluator as the canvas planes.
    const p = tweenPos(favAnim, performance.now());
    favMarker.setLatLng([p[0], p[1]]);
    const svg = favMarker.getElement() && favMarker.getElement().querySelector('svg');
    if(svg) svg.style.transform = `rotate(${p[2]}deg)`;
  }
}
requestAnimationFrame(glideFrame);

// canvas planes aren't individually clickable, so hit-test on map click: nearest
// plane within ~19px opens the same detail popup the DOM markers used to.
map.on('click', e=>{
  let best = null, bestLL = null, bd = 19*19;
  const cp = e.containerPoint, now = performance.now();
  for(const ac of latestPlanes){
    if(!ac.hex || typeof ac.lat!=='number') continue;
    if(isFav(ac) || hidden[classOf(ac)]) continue;
    // hit-test against where the plane is DRAWN (glided), not its raw fix — at high
    // zoom the two are tens of px apart, so clicking the visible sprite would miss.
    const ap = animPos(ac.hex, now);
    const lat = ap?ap[0]:ac.lat, lon = ap?ap[1]:ac.lon;
    const p = map.latLngToContainerPoint([lat,lon]);
    const d = (p.x-cp.x)*(p.x-cp.x) + (p.y-cp.y)*(p.y-cp.y);
    if(d < bd){ bd = d; best = ac; bestLL = L.latLng(lat,lon); }
  }
  if(best) openDetail(best, bestLL);
});

// API strings (owners, municipalities, callsigns) go straight into innerHTML — escape
// them. Free aviation DBs do carry stray &/< in owner names; cheap insurance.
const esc = s => String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmt(n,suff=''){return (n==null||n==='')?'—':(esc(n)+suff);}

// helper: origin->destination row from stored fields (already geo-validated when saved)
function routeODfromStored(st){
  if(typeof st.dLat!=='number') return '';
  return `<div class="route-od"><b>${esc(st.oI||'?')}</b> <span class="cty">${esc(st.oM||'')}</span>`
    + `<span class="arr">→</span><b>${esc(st.dI||'?')}</b> <span class="cty">${esc(st.dM||'')}</span></div>`;
}

function renderCard(state, data, route, est){
  if(razorCardActive) return;          // the Razor Crest easter egg owns the card right now
  if(state==='off'){ $card.classList.remove('show'); return; }

  // ===== OFFLINE / ESTIMATED states (data = stored last-known state) =====
  if(state==='enroute'||state==='lastknown'||state==='arrived'||state==='none'){
    const st = data, reg = esc((st&&st.reg) || fav);
    if(state==='none' || !st){
      $card.innerHTML = `
        <div class="reg">${reg}</div>
        <span class="badge b-none">NO SIGNAL</span>
        <div class="route" style="margin-top:14px">
          Not transmitting, and no recent track to estimate from. The frame
          will spotlight ${reg} the moment it’s back in the air.</div>`;
      $card.classList.add('show'); return;
    }
    const routeOD = routeODfromStored(st);
    const ago = agoStr(est?est.elapsedMs:(Date.now()-(st.ts||Date.now())));
    if(state==='arrived'){
      $card.innerHTML = `
        <div class="reg">${reg}</div>
        <span class="badge b-arr">LIKELY LANDED</span>
        ${routeOD}
        <dl>
          <dt>Callsign</dt><dd>${fmt(st.flight)}</dd>
          <dt>Type</dt><dd>${fmt(st.desc||st.t)}</dd>
          <dt>Operator</dt><dd>${fmt(st.ownOp)}</dd>
        </dl>
        <div class="est-note">Last tracked ${ago} ago approaching ${st.dM||st.dI||'destination'} — estimated to have landed. Re-spotlights on her next flight.</div>`;
      $card.classList.add('show'); return;
    }
    const badge = state==='enroute' ? ['b-est','ESTIMATED POSITION'] : ['b-est','LAST KNOWN'];
    let dyn;
    if(state==='enroute' && est){
      const eta = est.etaMin!=null ? (est.etaMin>=60? Math.floor(est.etaMin/60)+'h '+(est.etaMin%60)+'m' : est.etaMin+' min') : '—';
      dyn = `<dt>Progress</dt><dd>${est.pct!=null?est.pct+'%':'—'}</dd>
             <dt>To ${st.dI||'dest'}</dt><dd>${est.remNm!=null?est.remNm.toLocaleString()+' nm':'—'}</dd>
             <dt>Est. arrival</dt><dd>~${eta}</dd>`;
    }else{
      const alt = (st.alt==='ground')?'on ground':(st.alt!=null? Number(st.alt).toLocaleString()+' ft':'—');
      dyn = `<dt>Last alt</dt><dd>${alt}</dd>`;
    }
    $card.innerHTML = `
      <div class="reg">${reg}</div>
      <span class="badge ${badge[0]}">${badge[1]}</span>
      ${routeOD}
      <dl>
        <dt>Callsign</dt><dd>${fmt(st.flight)}</dd>
        <dt>Type</dt><dd>${fmt(st.desc||st.t)}</dd>
        ${dyn}
        <dt>Operator</dt><dd>${fmt(st.ownOp)}</dd>
      </dl>
      <div class="est-note">${state==='enroute'
        ? `Position estimated from last contact ${ago} ago, projected along the route. Live tracking resumes automatically when ${reg} transmits again.`
        : `Last contact ${ago} ago — showing last known position. Updates when signal returns.`}</div>`;
    $card.classList.add('show'); return;
  }

  // ===== LIVE states (data = live aircraft) =====
  let badge;
  if(state==='frame') badge=['b-frame','IN FRAME'];
  else if(state==='near') badge=['b-near','AIRBORNE · OFF-FRAME'];
  else badge=['b-gnd','ON THE GROUND'];
  const ac = data;
  const alt = ac.alt_baro==='ground' ? 'on ground'
            : (ac.alt_baro!=null? ac.alt_baro.toLocaleString()+' ft' : '—');
  const spd = ac.gs!=null? Math.round(ac.gs)+' kt' : '—';
  const dist = (ac.lat!=null)? Math.round(haversine(MI.lat,MI.lon,ac.lat,ac.lon)*0.539)+' nm from center' : '';
  // origin -> destination, only when adsbdb's route actually matches where she is (geo-gated,
  // same check as the click popup) so the terminals shown are accurate, never a stale route.
  let routeOD='';
  if(route && route.origin && route.destination && routeFits(ac, route)){
    const o=route.origin, d=route.destination;
    routeOD = `<div class="route-od"><b>${esc(o.iata_code||o.icao_code||'?')}</b> <span class="cty">${esc(o.municipality||'')}</span>`
      + `<span class="arr">→</span><b>${esc(d.iata_code||d.icao_code||'?')}</b> <span class="cty">${esc(d.municipality||'')}</span></div>`;
  }
  $card.innerHTML = `
    <div class="reg">${esc(ac.r||fav)}</div>
    <span class="badge ${badge[0]}">${badge[1]}</span>
    ${routeOD}
    <dl>
      <dt>Callsign</dt><dd>${fmt((ac.flight||'').trim())}</dd>
      <dt>Type</dt><dd>${fmt(ac.desc||ac.t)}</dd>
      <dt>Altitude</dt><dd>${alt}</dd>
      <dt>Speed</dt><dd>${spd}</dd>
      <dt>Operator</dt><dd>${fmt(ac.ownOp)}</dd>
    </dl>
    ${dist?`<div class="route">${dist}</div>`:''}`;
  $card.classList.add('show');
}

// her plane's route, cached per callsign so we don't re-hit adsbdb every 6s cycle.
// A FAILED lookup is retried after 10 min instead of being cached forever — a one-off
// network blip used to blank the route on her card for the entire flight.
let favRoute = null, favRouteCS = null, favRouteTs = 0;
async function getFavRoute(ac){
  const cs = (ac.flight||'').trim();
  if(!cs) return null;
  if(cs===favRouteCS && (favRoute || Date.now()-favRouteTs < 600000)) return favRoute;
  favRouteCS = cs;
  favRoute = await resolveRoute(ac);    // both sources, geo-validated, leg-picked
  favRouteTs = Date.now();
  return favRoute;
}

// ---- the main loop: fetch, then render() paints what we got ----
let cycling = false;     // re-entry guard: a slow fetch must not stack cycles
let favMisses = 0;       // consecutive polls without a live fix on the favourite
// pause polling in BACKGROUNDED tabs (no point burning API quota you can't see) —
// but only ones that were actually visible once, so headless/preview contexts that
// report permanently-hidden still poll normally.
let wasVisible = !document.hidden;
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden){ wasVisible = true; cycle(); } });
async function cycle(){
  if(cycling || (document.hidden && wasVisible)) return;
  cycling = true;
  try{ await _cycle(); } finally { cycling = false; }
}
async function _cycle(){
  try{
    const j = await getPlanes();
    latestPlanes = (j.ac||j.aircraft||[])
      .filter(a=>typeof a.lat==='number' && !String(a.category||'').startsWith('C')); // drop ground vehicles
  }catch(e){ /* keep last frame on a hiccup */ }
  const favInFrame = render();
  // persist trails (throttled) so reloads/reboots come back with history intact
  if(Date.now() - lastTrailSave > TRAIL_SAVE_MS){ lastTrailSave = Date.now(); saveTrails(); }

  // ---- the favourite: keep it spotlighted on the map WHEREVER it is ----
  // If it's outside the Michigan frame, ask the dedicated reg endpoint for its real
  // position and draw the marker there anyway. No auto-pan — use the centre buttons.
  let fd = favInFrame;
  if(!fd && fav && !fav.startsWith('TYPE:')){
    try{ fd = (await getFav(fav)).ac?.[0] || null; }catch(e){ fd = null; }
  }
  const hasPos = fd && typeof fd.lat==='number';

  if(hasPos){
    // ---- LIVE: real marker, save state for offline estimation, live card ----
    favMisses = 0;
    pushHistory(fd); favPos = [fd.lat, fd.lon];
    updateFavourite(fd, false);
    // her history push lands AFTER render() already redrew trails, so that redraw
    // clamped her trail against PRE-push history — leaving one segment drawn by
    // neither the static trail nor the head connector. Redraw now that it's pushed
    // (~2-3ms once per 4s; the other planes' clamp is unaffected by a second pass).
    planeLayer.redrawTrails();
    // following? keep her centred. setView(animate:false) = imperceptible few-px nudge each
    // cycle; a user drag/wheel sets following=false so it stops the instant you grab the map.
    if(following && favPos){ map.setView(favPos, map.getZoom(), {animate:false}); }
    let favRt = null;
    if((fd.flight||'').trim()) favRt = await getFavRoute(fd);
    saveFavState(fd, favRt);                       // persist last-known good state + validated route
    if(!fav) renderCard('off');
    else if(favInFrame) renderCard('frame', fd, favRt);
    else renderCard(fd.alt_baro==='ground' ? 'ground' : 'near', fd, favRt);
    return;
  }

  // ---- OFFLINE: no live signal -> dead-reckon from stored last-contact state ----
  if(!fav){ updateFavourite(null); renderCard('off'); return; }
  // one missed poll is almost always an API blip, not her going dark — keep the live
  // marker for a couple of cycles before flapping to the estimate ghost. (If we're
  // ALREADY estimating, keep estimating — the ghost should advance every cycle.)
  favMisses++;
  if(favMisses < 3 && favMarker && !favIsEst) return;
  const stored = loadFavState();
  const est = stored ? estimateFav(stored) : null;
  if(est && (est.tier==='enroute' || est.tier==='lastknown')){
    const ghost = {r:stored.reg, hex:(stored.hex||'EST'), flight:stored.flight, t:stored.t,
                   desc:stored.desc, lat:est.lat, lon:est.lon, track:est.track};
    favPos = [est.lat, est.lon];
    updateFavourite(ghost, true, est.from);        // est.from is undefined for lastknown -> no line
    if(following && favPos){ map.setView(favPos, map.getZoom(), {animate:false}); }
    renderCard(est.tier, stored, null, est);
  }else if(est && est.tier==='arrived'){
    updateFavourite(null);
    favPos = [stored.dLat, stored.dLon];
    renderCard('arrived', stored, null, est);
  }else{
    updateFavourite(null);
    renderCard('none', stored||null);
  }
}

// keep a rolling DISTANCE-windowed position history per plane (for trails)
const NM_PER_KM = 0.539957;
function pushHistory(ac){
  let h = history.get(ac.hex);
  if(!h){ h = []; h._v = 0; history.set(ac.hex, h); }
  h._seen = Date.now();
  h._cls = isFav(ac) ? h._cls : classOf(ac);    // trail colour source (class mode)
  const last = h[h.length-1];
  if(!last || Math.abs(last[0]-ac.lat)>1e-4 || Math.abs(last[1]-ac.lon)>1e-4){
    const alt = ac.alt_baro==='ground' ? 0 : (typeof ac.alt_baro==='number' ? ac.alt_baro : null);
    h.push([ac.lat, ac.lon, alt]); h._v++;
    // window by track DISTANCE, newest backwards; drop everything past the cap
    const capNm = isFav(ac) ? FAV_TRAIL_NM : TRAIL_NM;
    let total = 0;
    for(let i=h.length-1; i>0; i--){
      total += haversine(h[i][0],h[i][1], h[i-1][0],h[i-1][1]) * NM_PER_KM;
      if(total > capNm){ h.splice(0, i); break; }
    }
    const maxPts = isFav(ac) ? FAV_MAX_PTS : TRAIL_MAX_PTS;
    while(h.length > maxPts) h.shift();
  }
}

// ---- trail persistence: trails survive reloads/reboots (localStorage, throttled) ----
const TRAIL_STORE = 'ff_trail_hist', TRAIL_SAVE_MS = 30000;
let lastTrailSave = 0;
function saveTrails(){
  try{
    const o = {};
    for(const [hex,h] of history){
      if(h.length < 2) continue;
      o[hex] = [h._cls||'private', h._seen||0,
                h.map(p=>[+p[0].toFixed(4), +p[1].toFixed(4), p[2]==null?null:Math.round(p[2])])];
    }
    localStorage.setItem(TRAIL_STORE, JSON.stringify(o));
  }catch(e){}
}
function loadTrails(){
  try{
    const o = JSON.parse(localStorage.getItem(TRAIL_STORE)); if(!o) return;
    const now = Date.now(), cutoff = now - 10*60*1000;   // ignore anything >10 min old
    for(const [hex, entry] of Object.entries(o)){
      const [cls, seen, pts] = entry;
      if(!seen || seen < cutoff || !pts || pts.length<2) continue;
      // RESTART the grace window on restore (_seen=now): the 10-min staleness filter
      // already ran against the STORED value above. Without this the very first
      // render()'s 90s grace-cull deletes every just-restored trail whose plane isn't
      // in the first poll — silently truncating the 10-min persistence to 90s, and
      // ALWAYS killing her restored trail (favTrailHex is still null at that point).
      const h = pts.slice(); h._v = 1; h._cls = cls; h._seen = now;
      history.set(hex, h);
    }
    // seed favTrailHex from the persisted fav state so her restored trail draws
    // orange/wide from frame 1, before her first live fix re-establishes it.
    try{ const fs = JSON.parse(localStorage.getItem(FAV_STORE_KEY)); if(fs && fs.hex && history.has(fs.hex)) favTrailHex = fs.hex; }catch(e){}
  }catch(e){}
}
loadTrails();
window.addEventListener('pagehide', saveTrails);

// ---- paint: planes go to the canvas layer; this keeps trails/airports/count in step ----
function render(){
  const planes = latestPlanes;
  const seen = new Set();
  let favInFrame = null;
  const now = performance.now();
  for(const ac of planes){
    if(!ac.hex || typeof ac.lat!=='number') continue;
    if(isFav(ac)){ favInFrame = ac; continue; }
    seen.add(ac.hex);
    // history grows even for legend-hidden classes (cheap) so toggling a class
    // back on shows its trails instantly instead of regrowing from zero
    pushHistory(ac);
    commitAnim(ac.hex, ac.lat, ac.lon, ac.track,
               (ac.alt_baro!=='ground' && typeof ac.gs==='number') ? ac.gs : 0, now);
  }
  // cull trails/history only after the GRACE window — edge-of-circle blinks and
  // brief signal gaps no longer wipe a plane's trail
  const cutoff = Date.now() - TRAIL_GRACE_MS;
  for(const [hex,h] of history){
    if(!seen.has(hex) && hex!==favTrailHex && (h._seen||0) < cutoff){
      history.delete(hex); anim.delete(hex);
    }
  }
  liveHexes = seen;   // trail clamp reads this (only feed-present planes get clamped)
  planeLayer.redrawTrails();
  planeLayer.redrawPlanes();   // also covers contexts where rAF is throttled (hidden/headless)
  updateAirports();
  countEl.innerHTML = `<b>${planes.length}</b> aircraft in frame`;
  return favInFrame;   // the favourite marker is drawn from cycle() (works off-frame too)
}
// airports are viewport-gated, so refresh them when the view settles after a pan/zoom
// (the plane canvas handles its own moveend redraw via PlaneLayer.getEvents)
map.on('moveend', updateAirports);

// the favourite: a highlighted silhouette. est=true draws the dead-reckoned ghost (dimmed,
// dashed projection line, frozen real trail left in place). projFrom = last-contact [lat,lon].
let favIsEst = false;   // is the current favourite marker the dead-reckoned ghost?
let favAnim = null;     // her glide tween — the rAF loop positions the DOM marker from this
function updateFavourite(ac, est, projFrom){
  favIsEst = !!(ac && est);
  if(!ac){
    if(favMarker){ map.removeLayer(favMarker); favMarker = null; }
    favAnim = null; favTrailHex = null;
    clearEstLine();
    return;
  }
  // commit her glide target (same tween shape as the canvas planes). The ghost
  // estimate carries no gs -> no extrapolation for it (it advances per cycle by
  // its own dead-reckoning; doubling up would double-count her speed).
  const now = performance.now(), trk = (typeof ac.track==='number') ? ac.track : 0;
  const gs = (!est && ac.alt_baro!=='ground' && typeof ac.gs==='number') ? ac.gs : 0;
  if(!favAnim){ favAnim = {fLat:ac.lat,fLon:ac.lon,fTrk:trk, tLat:ac.lat,tLon:ac.lon,tTrk:trk, gs:gs, t0:now-REFRESH_MS}; }
  else if(ac.lat===favAnim.tLat && ac.lon===favAnim.tLon){
    favAnim.gs = gs;                    // identical fix: keep the tween/extrapolation clock
  }else{
    const d = tweenPos(favAnim, now);   // displayed pos, extrapolation included — no snap
    favAnim.fLat = d[0]; favAnim.fLon = d[1]; favAnim.fTrk = d[2];
    favAnim.tLat = ac.lat; favAnim.tLon = ac.lon; favAnim.tTrk = trk;
    favAnim.gs = gs; favAnim.t0 = now;
  }
  const fam = famOf(ac), size = Math.max(36, silSize(fam, map.getZoom())+8);
  const key = ac.hex + fam + size + (est?'E':'');
  if(!favMarker){
    favMarker = L.marker([ac.lat,ac.lon],{icon:favIcon(ac,est),zIndexOffset:1000,keyboard:false}).addTo(map);
    favMarker.on('click', onPlaneClick); favMarker._key = key;
  }else if(favMarker._key !== key){
    // icon rebuild: place at the CURRENT displayed spot, not the new fix (no jump);
    // the glide loop walks it to the fix over the next cycle
    favMarker.setIcon(favIcon(ac,est)); favMarker._key = key;
    favMarker.setLatLng([favAnim.fLat, favAnim.fLon]);
  }
  // (position + rotation between fixes are owned by the glide loop)
  favMarker._ac = ac;
  if(est){
    // ESTIMATED: draw the dashed projection from last contact; leave the real trail frozen
    // (it stops growing when she goes dark — an honest "this is the last real data" breadcrumb).
    if(projFrom) drawEstLine(projFrom,[ac.lat,ac.lon]); else clearEstLine();
  }else{
    // LIVE: the projection line goes away; her trail is drawn by the trail canvas
    // (favTrailHex -> orange, wide, long window)
    clearEstLine();
    favTrailHex = ac.hex;
  }
}

// ---- airport beacons: build only the in-frame ones (zoom-gated for perf) ----
function aptIcon(a){
  return L.divIcon({className: a.s>=3 ? 'apt big' : 'apt', iconSize:[10,10], iconAnchor:[5,5],
    html:`<div class="apt-ring"></div><div class="apt-core"></div><div class="apt-label">${a.i}</div>`});
}
function updateAirports(){
  const z = map.getZoom(), b = map.getBounds(), keep = new Set();
  const w=b.getWest(), e=b.getEast(), s=b.getSouth(), n=b.getNorth();
  for(const a of AIRPORTS){
    if(a.s < 3 && z < APT_MED_ZOOM) continue;            // regionals only when zoomed in
    if(a.y<s || a.y>n || a.x<w || a.x>e) continue;       // only build what's in frame
    keep.add(a.i);
    if(!aptMarkers.has(a.i)){
      aptMarkers.set(a.i, L.marker([a.y,a.x],{icon:aptIcon(a), pane:'airports',
        interactive:false, keyboard:false}).addTo(map));
    }
  }
  for(const [k,m] of aptMarkers){ if(!keep.has(k)){ map.removeLayer(m); aptMarkers.delete(k); } }
}

// ---- click a plane -> a popup with flight #, route, type, airline, photo ----
let detailSeq = 0;
function onPlaneClick(e){
  const ac = e.target && e.target._ac;
  if(ac) openDetail(ac, e.target.getLatLng ? e.target.getLatLng() : e.latlng);
}
function openDetail(ac, latlng){
  const seq = ++detailSeq;
  const pop = L.popup({className:'plane-pop', maxWidth:300, minWidth:200, autoPanPadding:[34,70]})
    .setLatLng(latlng).setContent(detailHTML(ac, undefined, undefined)).openOn(map);
  Promise.all([ resolveRoute(ac), ac.r?getAC(ac.r):Promise.resolve(null) ])
    .then(([route, acd])=>{ if(seq===detailSeq && map.hasLayer(pop)) pop.setContent(detailHTML(ac, route, acd)); });
}
function airportBit(a){
  return a ? `<b>${esc(a.iata_code||a.icao_code||'?')}</b> <span class="city">${esc(a.municipality||a.name||'')}</span>` : '?';
}
function detailHTML(ac, route, acd){
  const csICAO = (ac.flight||'').trim();
  // friendlier boarding-pass # (DL2591 vs DAL2591) — but ONLY if adsbdb returned a PROPER IATA
  // flight number with an airline letter prefix. It sometimes hands back a bare number ("2394"
  // for Porter, "621" for Flair) which reads worse than the ICAO callsign — guard for a letter.
  const csIATA = (route && route.callsign_iata && /[A-Za-z]/.test(route.callsign_iata)) ? route.callsign_iata : null;
  const cs = csIATA || csICAO || ac.r || '—';
  const alObj = airline(ac);
  // prefer the LOCAL airline name over adsbdb's: adsbdb mislabels shared ICAO codes
  // (e.g. Porter PTR -> "Nova Scotia Dept of Lands and Forests"). Local map wins when known.
  const al = (alObj&&alObj.n) || (route&&route.airline&&route.airline.name) || '';
  const alColor = alObj && alObj.c;          // colour the airline name by its brand
  const o = route&&route.origin, d = route&&route.destination;
  const type = (acd&&acd.type) || ac.desc || ac.t || '—';
  // on airliners the feed's "operator" is usually a leasing trust (BANK OF UTAH TRUSTEE);
  // the real airline is already the chip, so drop the trust noise. Keep owner for GA/unknown.
  const isComm = classOf(ac)==='commercial';
  const op = (isComm && al) ? '' : ((acd&&acd.registered_owner) || ac.ownOp || '');
  const photo = acd&&acd.url_photo_thumbnail;
  const icaoTag = (csIATA && csICAO && csIATA!==csICAO) ? `<span class="pop-icao">${esc(csICAO)}</span>` : '';
  let routeRow;
  // the route arriving here came through resolveRoute() — already geo-validated and
  // leg-picked across both sources — so it's show-or-nothing, no re-gate.
  if(route===undefined) routeRow = `<div class="pop-route dim">looking up route…</div>`;
  else if(o && d) routeRow = `<div class="pop-route">${airportBit(o)} <span>→</span> ${airportBit(d)}</div>`;
  else routeRow = `<div class="pop-route dim">route unavailable</div>`;   // genuinely unpublished (charters) or nothing fits
  return `<div class="pop-cs">${esc(cs)}${icaoTag}${al?`<span class="pop-al"${alColor?` style="color:${alColor}"`:''}>${esc(al)}</span>`:''}</div>`
       + routeRow
       + `<div class="pop-meta">${esc(type)}${op?` · ${esc(op)}`:''}</div>`
       + (photo?`<img class="pop-img" src="${esc(photo)}" referrerpolicy="no-referrer" onerror="this.remove()">`:'');
}
async function getRoute(cs){
  try{ const j = (await tryProxy('/api/route?cs='+encodeURIComponent(cs)))
        || await (await fetch(`https://api.adsbdb.com/v0/callsign/${encodeURIComponent(cs)}`)).json();
    return (j && j.response && j.response.flightroute) || null; }catch(e){ return null; }
}
async function getAC(reg){
  try{ const j = (await tryProxy('/api/ac?reg='+encodeURIComponent(reg)))
        || await (await fetch(`https://api.adsbdb.com/v0/aircraft/${encodeURIComponent(reg)}`)).json();
    return (j && j.response && j.response.aircraft) || null; }catch(e){ return null; }
}

// ---- fallback route source: adsb.lol's community VRS standing data (CORS-open CDN).
// Multi-leg aware: a file can hold a whole rotation (e.g. RDU-EWR-ORD-PDX); each
// adjacent pair is a candidate leg. Audit (Jun 11, 130 live callsigns): adsbdb showed
// 36%, and of the routes it hid as stale, adsb.lol had a geo-fitting route for ~70%.
const LOL_CDN = 'https://vrs-standing-data.adsb.lol/routes';
function lolToAirport(a){   // normalise to the adsbdb shape the rest of the code speaks
  return {iata_code:a.iata, icao_code:a.icao, municipality:a.location||a.name||'',
          latitude:a.lat, longitude:a.lon};
}
async function getLolAirports(cs){
  try{
    const j = (await tryProxy('/api/lolroute?cs='+encodeURIComponent(cs)))
          || await (await fetch(`${LOL_CDN}/${encodeURIComponent(cs.slice(0,2))}/${encodeURIComponent(cs)}.json`)).json();
    const apts = j && j._airports;
    return (apts && apts.length>=2) ? apts.map(lolToAirport) : null;
  }catch(e){ return null; }
}
// the route to DISPLAY for this aircraft. Both sources are fetched (cheap: both cached
// 1h server-side / CDN), every candidate leg is ranked against the live position,
// heading and climb rate, and the strongest evidence wins; ties go to adsbdb (it
// carries the IATA flight # + airline metadata). Returns a validated
// {origin,destination,...} or null -> "route unavailable".
async function resolveRoute(ac){
  const cs = (ac.flight||'').trim();
  if(!cs) return null;
  const [r, apts] = await Promise.all([getRoute(cs), getLolAirports(cs)]);
  const rRank = (r && r.origin && r.destination) ? legRank(ac, r.origin, r.destination) : 0;
  let best=null, bestRank=0;
  if(apts) for(let i=0;i<apts.length-1;i++){
    const k = legRank(ac, apts[i], apts[i+1]);
    if(k > bestRank){ bestRank=k; best={origin:apts[i], destination:apts[i+1]}; }
  }
  if(rRank > 0 && rRank >= bestRank) return r;
  if(best){
    // callsign-derived metadata (flight #, airline) is route-independent — keep it
    if(r){ best.callsign_iata = r.callsign_iata; best.airline = r.airline; }
    return best;
  }
  return null;
}

// ============================================================================
//  Razor Crest — a hidden easter egg. A faint red ghost plane drifts slowly and
//  randomly around Michigan, with NO label. Click it and: (1) the Cyrano de
//  Bergerac lines appear in a popup, (2) a custom message takes over the info
//  card (it isn't a real aircraft, so there's no flight data), and (3) the ghost
//  vanishes and reappears somewhere new. Hard to spot unless you really look.
// ============================================================================
// Harrison's hidden messages for Allie (from "Harrisons Lines.rtf"). Each click draws ONE,
// weighted by rarity: per his design, more #'s = rarer — but spread MORE EVENLY (Christian's
// call) at tiers w: 4 / 3 / 2 / 1, so the rarest is only ~4x less likely than the common ones
// (was 8x). Common notes still surface most; the three "super secret" (####) stay the treasures.
const RAZOR_MSGS = [
  {w:4, t:"Happy Birthday Allie, I hope you enjoy looking at all these planes :)"},
  {w:4, t:"I love you little lady!"},
  {w:4, t:"You found me! You are goose"},
  {w:4, t:"rain rain rain"},
  {w:4, t:"You are the best thing to ever happen to me &lt;3"},
  {w:3, t:"GHOST PLANE GHOST PLANE YAY"},
  {w:3, t:"You have SUPER pretty eyes! Mmmm Heterochromia."},
  {w:3, t:"I will never stop thinking about you my love"},
  {w:2, t:"You look REALLY pretty like all of the time btw. Hehehe"},
  {w:2, t:"You are GORGEOUS little lady!"},
  {w:2, t:"I am so excited to keep dating you lady"},
  {w:1, t:"Super secret message number one of three… YOU ARE SO AMAZING I kinda wanna be with you forever"},
  {w:1, t:"Super secret message number two of three… GOOSE GOOSE GOOSE GOOSE. GHOST SHIP WOOHOO"},
  {w:1, t:"Super secret message number three of three… I love you more than I ever thought I could love anyone. You changed the way I understand myself and my life. You make me appreciate myself and you keep me accountable. I love you I love you I love you."}
];
// weighted random draw — fewer #'s (higher w) appear more often
function razorPick(){
  const total = RAZOR_MSGS.reduce((s,m)=>s+m.w, 0);
  let r = Math.random()*total;
  for(const m of RAZOR_MSGS){ if((r -= m.w) < 0) return m.t; }
  return RAZOR_MSGS[0].t;
}
// a small twin-pod gunship silhouette (nose up), drawn red at low opacity
const RAZOR_SVG = `<rect x="46" y="14" width="8" height="70" rx="3"/><path d="M50 7 L45.5 19 L54.5 19 Z"/><rect x="22" y="31" width="7" height="38" rx="3"/><rect x="71" y="31" width="7" height="38" rx="3"/><rect x="27" y="45" width="46" height="6" rx="3"/><rect x="41" y="82" width="18" height="5" rx="2.5"/>`;
const GHOST_BOX = {latMin:42.05, latMax:46.9, lonMin:-89.6, lonMax:-82.6};   // stays inside the Michigan frame
const GHOST_DPS = 0.018;     // degrees/sec — a slow drift; constant speed regardless of timer throttling
const GHOST_MIN_ZOOM = 8;    // only VISIBLE when fairly zoomed in (default view is z6) — keeps it hidden
let ghost = null, ghostMarker = null, ghostLast = Date.now();

function ghostRand(){ return [GHOST_BOX.latMin + Math.random()*(GHOST_BOX.latMax-GHOST_BOX.latMin),
                              GHOST_BOX.lonMin + Math.random()*(GHOST_BOX.lonMax-GHOST_BOX.lonMin)]; }
function ghostBearing(a,b,c,d){ return (_bearing(a,b,c,d)*180/Math.PI + 360) % 360; }
function ghostIcon(){
  const s = 30;
  return L.divIcon({className:'plane ghost', iconSize:[s,s], iconAnchor:[s/2,s/2],
    html:`<div class="sil" style="color:#ff2b2b"><svg width="${s}" height="${s}" viewBox="0 0 100 100" style="transform:rotate(${ghost?ghost.track:0}deg)"><g fill="currentColor">${RAZOR_SVG}</g></svg></div>`});
}
function ghostSpawn(){
  const [lat,lon]=ghostRand(), [tLat,tLon]=ghostRand();
  ghost = {lat,lon,tLat,tLon,track:ghostBearing(lat,lon,tLat,tLon)};
}
function ghostRender(){
  if(!ghost) return;
  // create the marker once (handler bound once) but only SHOW it when fairly zoomed in.
  // It keeps drifting in the background while hidden, so it's in a fresh spot when you find it.
  if(!ghostMarker){
    ghostMarker = L.marker([ghost.lat,ghost.lon],{icon:ghostIcon(),zIndexOffset:450,keyboard:false});
    ghostMarker.on('click', onGhostClick);
  }
  if(map.getZoom() >= GHOST_MIN_ZOOM){
    if(!map.hasLayer(ghostMarker)) ghostMarker.addTo(map);
    ghostMarker.setLatLng([ghost.lat,ghost.lon]);
    const svg = ghostMarker.getElement() && ghostMarker.getElement().querySelector('svg');
    if(svg) svg.style.transform = `rotate(${ghost.track}deg)`;
  }else if(map.hasLayer(ghostMarker)){
    map.removeLayer(ghostMarker);   // zoomed out -> hide it
  }
}
map.on('zoomend', ghostRender);     // toggle visibility the instant zoom crosses the threshold
function ghostTick(){
  if(!ghost) return;
  const now=Date.now(), dt=Math.min(2000, now-ghostLast)/1000; ghostLast=now;
  const dLat=ghost.tLat-ghost.lat, dLon=ghost.tLon-ghost.lon, dist=Math.hypot(dLat,dLon);
  const step=GHOST_DPS*dt;
  if(dist < Math.max(step*1.5, 0.02)){                 // reached the target -> pick a new random one
    const [tLat,tLon]=ghostRand(); ghost.tLat=tLat; ghost.tLon=tLon;
  }else{
    ghost.lat += (dLat/dist)*step; ghost.lon += (dLon/dist)*step;
  }
  ghost.track = ghostBearing(ghost.lat,ghost.lon,ghost.tLat,ghost.tLon);
  ghostRender();
}
function onGhostClick(e){
  L.DomEvent.stopPropagation(e);
  const msg = razorPick();                          // one weighted-random hidden message
  // 1) the message, as a popup at the ghost's current spot
  const html = `<div class="razor-pop"><div class="razor-title">Razor Crest</div>`
    + `<div class="razor-line">${msg}</div></div>`;
  const pop = L.popup({className:'plane-pop razor', maxWidth:340, minWidth:250, autoPanPadding:[34,70]})
    .setLatLng(ghostMarker.getLatLng()).setContent(html).openOn(map);
  pop._razor = true;
  // 2) the info card explains it isn't a real plane (no flight data) + nudges the hunt
  razorCardActive = true;
  $card.innerHTML = `<div class="reg">Razor Crest</div>`
    + `<span class="badge b-ghost">GHOST CONTACT</span>`
    + `<div class="ghost-msg">Not a real aircraft — a phantom on the wire. No flight data, only hidden messages. The rarer ones are harder to catch…</div>`
    + `<div class="est-note">Blink and it’s gone. Find it again.</div>`;
  $card.classList.add('show');
  // 3) vanish from here, reappear somewhere else random
  ghostSpawn(); ghostRender();
}
// when the Razor popup closes, hand the card back to the favourite
map.on('popupclose', e=>{ if(e.popup && e.popup._razor){ razorCardActive=false; cycle(); } });
ghostSpawn(); ghostRender();
setInterval(ghostTick, 120);

// ---- dev live-reload: poll the file version and reload the page when it changes.
//      localhost only: hosted (pages.dev) has no /api/version — its SPA fallback
//      answers 200 + the full page, so polling there is pure junk traffic ----
(function(){ if(!/^(localhost|127\.0\.0\.1)$/.test(location.hostname)) return;
  let base=null;
  setInterval(async()=>{ try{ const r=await fetch('/api/version',{cache:'no-store'}); if(!r.ok) return;
    const v=(await r.json()).v; if(base===null) base=v; else if(v!==base) location.reload(); }catch(e){} }, 2000);
})();

// cached formatter + element: toLocaleTimeString builds a fresh Intl formatter per
// call, which is silly to pay every second forever on a Pi.
const clockEl = document.getElementById('clock');
const clockFmt = new Intl.DateTimeFormat('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
setInterval(()=>{ clockEl.textContent = clockFmt.format(new Date()); },1000);

cycle();
setInterval(cycle, REFRESH_MS);
</script>
</body>
</html>
